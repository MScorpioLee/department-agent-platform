name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    name: Server tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Run tests
        run: uv run --extra dev pytest -q

  web:
    name: Web tests + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Enable pnpm
        run: corepack enable
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Unit tests
        run: pnpm test
      - name: Build
        run: pnpm build

  desktop-rust:
    name: Desktop Rust tests (local tool layer)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: desktop/src-tauri
    steps:
      - uses: actions/checkout@v4
      - name: Run cargo tests (path-lock 等安全核心)
        run: cargo test --bin department-agent-desktop
