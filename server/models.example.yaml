# 模型网关配置示例。复制为 server/models.yaml(已被 .gitignore 忽略)并填写,
# 用 AGENT_MODELS_CONFIG_PATH 指向它即可启用模型对话。
# backend 底层可以是合规 API key、Hermes/OpenClaw OAuth 代理,或本地模型,对上层统一。
#
# 安全:api_key 用 ${ENV_VAR} 占位,真实值只放环境变量,绝不写进文件或提交。
# 例:export DEEPSEEK_API_KEY=sk-xxxx 后再启动 Server。

backends:
  # —— 合规 API key(开发期推荐,最省事)——
  - id: deepseek
    base_url: https://api.deepseek.com/v1
    model: deepseek-chat        # 2026-07-24 前有效;之后改用 deepseek-v4-flash
    api_key: ${DEEPSEEK_API_KEY}
    max_concurrency: 2

  # —— OAuth 代理(Hermes proxy,把 ChatGPT/Codex 订阅暴露成本地端点)——
  # 仅开发期用,不作生产基础设施(厂商可能封订阅计费、ToS 风险)。
  # - id: codex-sub1
  #   base_url: http://127.0.0.1:11500/v1
  #   model: gpt-5.1-codex      # 以 hermes proxy 实际暴露的 model 名为准
  #   api_key: hermes-proxy     # OAuth 代理通常忽略此值
  #   max_concurrency: 2

# 用户 → backend 路由(静态分配最利于审计)。未列出的用户落到 default_backend_id。
user_routes:
  # alice: deepseek
  # bob: codex-sub1

default_backend_id: deepseek
